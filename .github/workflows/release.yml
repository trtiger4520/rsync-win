name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Protocol core tests
        run: dotnet test tests/RsyncWin.Protocol.Tests

      - name: Publish win-x64 single-file
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet publish src/RsyncWin.Cli -c Release -r win-x64 --self-contained \
            -p:PublishSingleFile=true -p:Version="$VERSION" \
            -o publish/win-x64

      - name: Package
        run: zip -j "rsyncwin-${GITHUB_REF_NAME}-win-x64.zip" publish/win-x64/rsyncwin.exe

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "rsyncwin-${GITHUB_REF_NAME}-win-x64.zip" --generate-notes
