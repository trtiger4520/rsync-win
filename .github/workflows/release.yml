name: release

on:
  push:
    branches: ["main"]

# semantic-release needs to push tags, create releases, and comment on the
# PRs/issues it resolves.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # semantic-release analyses the whole history to find the last tag.
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Protocol core tests
        run: dotnet test tests/RsyncWin.Protocol.Tests

      - name: Install release tooling
        run: npm ci

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
