name: release

on:
  push:
    branches: ["main"]

# Serialize releases: two merges landing seconds apart would both compute the
# same next version off the last tag and collide on the tag/Release push.
# Never cancel an in-flight release — a half-published tag is worse than a wait.
concurrency:
  group: release
  cancel-in-progress: false

# semantic-release needs to push tags, create releases, and comment on the
# PRs/issues it resolves.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Gate the release on the full hermetic suite. This is a Windows product:
  # Fs/Cli/WindowsFs tests use cmd.exe, NTFS attributes, junctions and symlinks
  # that only work on Windows, so the gate MUST run on windows-latest — the same
  # `Category!=Interop` filter CLAUDE.md defines as the no-rsync hermetic suite.
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Hermetic test suite
        run: dotnet test --filter "Category!=Interop"

  # Publish + tag only after the Windows gate is green. Runs on Linux because the
  # packaging step needs `zip`, and `dotnet publish -r win-x64` cross-compiles fine.
  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # semantic-release analyses the whole history to find the last tag.
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install release tooling
        run: npm ci

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
