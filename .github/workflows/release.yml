name: release

on:
  push:
    branches: ["main"]

# Serialize releases: two merges landing seconds apart would both compute the
# same next version off the last tag and collide on the tag/Release push.
# Never cancel an in-flight release — a half-published tag is worse than a wait.
concurrency:
  group: release
  cancel-in-progress: false

# semantic-release needs to push tags, create releases, and comment on the
# PRs/issues it resolves.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # semantic-release analyses the whole history to find the last tag.
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # This is the ONLY gate before an automatic publish, so run the whole
      # hermetic suite (Protocol/Engine/Fs/Cli/Transport), not just the core.
      # Interop is excluded — it needs Docker rsync peers this job doesn't have.
      - name: Hermetic test suite
        run: dotnet test --filter "Category!=Interop"

      - name: Install release tooling
        run: npm ci

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
