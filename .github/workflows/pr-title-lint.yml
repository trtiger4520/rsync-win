name: pr-title-lint

# The release pipeline derives the version from the squash-merge commit message,
# which GitHub takes from the PR title. Lint the title so a release-worthy change
# with a non-conforming title fails loudly here instead of silently skipping the
# release after merge.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
